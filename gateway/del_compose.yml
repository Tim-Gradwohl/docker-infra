name: gateway

services:
  traefik:
    image: traefik:v3.6.4
    container_name: gateway_traefik
    restart: unless-stopped

    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}

    command:
      - --api=true
      - --api.dashboard=true
      - --log.level=INFO

      - --providers.docker=true
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --providers.docker.exposedbydefault=false

      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=false

      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http.tls=true

      # (Optional but recommended) Redirect all http -> https at the entrypoint
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https

      # ACME DNS-01 via Cloudflare
      - --certificatesresolvers.le_cf.acme.email=tim.gradwohl@protonmail.com
      - --certificatesresolvers.le_cf.acme.storage=/acme.json
      - --certificatesresolvers.le_cf.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.le_cf.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53

      # OPTIONAL: staging first to avoid rate limits (remove later)
      # - --certificatesresolvers.le_cf.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/tim/stacks/gateway/dynamic:/etc/traefik/dynamic:ro
      - /home/tim/stacks/gateway/certs:/etc/traefik/certs:ro
      - /home/tim/stacks/gateway/data/acme.json:/acme.json

    networks:
      - proxy

    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      - traefik.http.routers.traefik.rule=Host(`traefik.${BASE_DOMAIN}`)
      - traefik.http.routers.traefik.entrypoints=websecure
      - traefik.http.routers.traefik.tls=true
      - traefik.http.routers.traefik.service=api@internal
      - traefik.http.routers.traefik.tls.certresolver=le_cf
      - traefik.http.routers.traefik.tls.domains[0].main=timopoly.com
      - traefik.http.routers.traefik.tls.domains[0].sans=*.timopoly.com

      - traefik.http.middlewares.dash-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}
        # - traefik.http.routers.traefik.middlewares=dash-allowlist@file,dash-auth

networks:
  proxy:
    external: true
