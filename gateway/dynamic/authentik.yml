http:
  services:
    authentik-outpost:
      loadBalancer:
        servers:
          - url: "http://authentik_proxy:9000"

  middlewares:
    authentik-forwardauth:
      forwardAuth:
        address: "http://authentik_proxy:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid

    authentik-errors:
      errors:
        status:
          - "401-403"
        # ✅ send users to the outpost (where /outpost.goauthentik.io/* exists)
        service: authentik-outpost
        query: "/outpost.goauthentik.io/start?rd={url}"

    authentik-chain:
      chain:
        middlewares:
          - authentik-forwardauth
          - authentik-errors
