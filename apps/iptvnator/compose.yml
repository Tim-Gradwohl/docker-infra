name: iptvnator
services:
  iptvnator:
    image: 4gray/iptvnator:latest
    container_name: iptvnator
    restart: unless-stopped

    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      # LAN-only host routing using global variable
      - traefik.http.routers.iptvnator.rule=Host(`iptv.${BASE_DOMAIN}`) 
      #http
      #- traefik.http.routers.iptvnator.entrypoints=web
      #https
      - traefik.http.routers.iptvnator.entrypoints=websecure  
      - traefik.http.routers.iptvnator.tls=true  
      - traefik.http.routers.iptvnator.tls.certresolver=cloudflare


      - traefik.http.services.iptvnator.loadbalancer.server.port=80
      # - traefik.http.routers.iptvnator.middlewares=authentik-chain@file
      # - traefik.http.routers.iptvnator.middlewares=${TRAEFIK_AUTH_MIDDLEWARE}
    volumes:
      # Persist IPTVnator app data/settings
      - iptvnator_data:/app/data

volumes:
  iptvnator_data:

networks:
  proxy:
    external: true

