services:
  transkun:
    container_name: transkun
    build:
      context: /home/tim/stacks/apps/transkun
      dockerfile: /home/tim/stacks/apps/transkun/Dockerfile
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - /home/tim/stacks/apps/transkun/data/in:/data/in:rw
      - /home/tim/stacks/apps/transkun/data/out:/data/out:rw
    gpus: all

  transkun_web:
    container_name: transkun_web
    build:
      context: /home/tim/stacks/apps/transkun
      dockerfile: /home/tim/stacks/apps/transkun/Dockerfile
    restart: unless-stopped

    working_dir: /app
    command: ["bash", "-lc", "uvicorn app:app --host 0.0.0.0 --port 8000"]
    networks:
      - internal
      - proxy
    volumes:
      - /home/tim/stacks/apps/transkun/data/in:/data/in:rw
      - /home/tim/stacks/apps/transkun/data/out:/data/out:rw
    gpus: all

    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.transkun.rule=Host(`transkun.${BASE_DOMAIN}`)
      - traefik.http.routers.transkun.entrypoints=web
      - traefik.http.services.transkun.loadbalancer.server.port=8000

      # OPTIONAL hardening (enable if you have a LAN allowlist middleware defined in Traefik file provider):
      # - traefik.http.routers.transkun.middlewares=lan-allowlist@file

networks:
  internal:
    external: false
  proxy:
    external: true
