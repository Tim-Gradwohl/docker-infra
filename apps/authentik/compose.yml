name: authentik

services:
  authentik-postgres:
    image: postgres:16-alpine
    container_name: authentik_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?set in shared/.env.secrets}
      POSTGRES_DB: authentik
    volumes:
      - authentik_pgdata:/var/lib/postgresql/data
    networks:
      - internal

  authentik-redis:
    image: redis:7-alpine
    container_name: authentik_redis
    restart: unless-stopped
    networks:
      - internal

  authentik-server:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik_server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set in shared/.env.secrets}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?set in shared/.env.secrets}

      AUTHENTIK_HOST: http://auth.${BASE_DOMAIN}
      AUTHENTIK_LISTEN__HTTP: 0.0.0.0:9000
      AUTHENTIK_LISTEN__HTTPS: 0.0.0.0:9443
      AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"

    depends_on:
      - authentik-postgres
      - authentik-redis
    volumes:
      - authentik_media:/media
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.authentik.rule=Host(`auth.${BASE_DOMAIN}`)
      - traefik.http.routers.authentik.entrypoints=web
      - traefik.http.services.authentik.loadbalancer.server.port=9000
      # IMPORTANT: do NOT protect authentik with authentik forwardAuth (bootstrapping)

  authentik-worker:
    image: ghcr.io/goauthentik/server:latest
    container_name: authentik_worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set in shared/.env.secrets}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_POSTGRES_PASSWORD:?set in shared/.env.secrets}
      
      AUTHENTIK_HOST: http://auth.${BASE_DOMAIN}
      AUTHENTIK_LISTEN__HTTP: 0.0.0.0:9000
      AUTHENTIK_LISTEN__HTTPS: 0.0.0.0:9443
      AUTHENTIK_DISABLE_STARTUP_ANALYTICS: "true"
    depends_on:
      - authentik-postgres
      - authentik-redis
    volumes:
      - authentik_media:/media
    networks:
      - internal

  # Outpost used by Traefik ForwardAuth (we’ll wire this in Step 2)
  authentik-proxy:
    image: ghcr.io/goauthentik/proxy:latest
    container_name: authentik_proxy
    restart: unless-stopped
    depends_on:
      - authentik-server
    environment:
      # Internal API URL (Docker-only) ✅
      AUTHENTIK_HOST: http://authentik-server:9000

      # Public URL the browser can reach ✅ (THIS IS THE FIX)
      AUTHENTIK_HOST_BROWSER: http://auth.${BASE_DOMAIN}

      AUTHENTIK_INSECURE: "true"
      AUTHENTIK_TOKEN: ${AUTHENTIK_OUTPOST_TOKEN:-}
    networks:
      - internal
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy

      # ✅ Route ONLY the outpost paths on auth.<domain> to authentik_proxy
      - traefik.http.routers.authentik-outpost.rule=Host(`auth.${BASE_DOMAIN}`) && PathPrefix(`/outpost.goauthentik.io/`)
      - traefik.http.routers.authentik-outpost.entrypoints=web
      - traefik.http.routers.authentik-outpost.priority=100
      - traefik.http.services.authentik-outpost.loadbalancer.server.port=9000


volumes:
  authentik_pgdata:
  authentik_media:

networks:
  internal:
    driver: bridge
  proxy:
    external: true
