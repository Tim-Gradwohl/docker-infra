services:

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: qbittorrentvpn_gluetun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      # Gluetun state + forwarded_port contract
      - /home/tim/stacks/apps/qbittorrentvpn/gluetun:/gluetun
      # Generated WireGuard config
      - /home/tim/stacks/apps/qbittorrentvpn/wireguard-pia/wg0.conf:/gluetun/wireguard/wg0.conf:ro
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_IMPLEMENTATION=userspace   # 🔥 REQUIRED for WSL2 stability
      - FIREWALL=on
      - FIREWALL_INPUT_PORTS=8080
      - LOG_LEVEL=info
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.qbittorrentvpn.rule=Host(`qbittorrent.${BASE_DOMAIN}`)
      - traefik.http.routers.qbittorrentvpn.entrypoints=web
      - traefik.http.routers.qbittorrentvpn.priority=10000
      - traefik.http.routers.qbittorrentvpn.service=qbittorrentvpn-svc
      - traefik.http.services.qbittorrentvpn-svc.loadbalancer.server.port=8080
    restart: unless-stopped


  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrentvpn-qbittorrent-1
    network_mode: "service:gluetun"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - /home/tim/stacks/apps/qbittorrentvpn/qbittorrent:/config
      - /mnt/d/Torrent:/downloads
    depends_on:
      - gluetun
    restart: unless-stopped


  pia-pf:
    image: thrnz/docker-wireguard-pia:latest
    container_name: qbittorrentvpn_pia-pf
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /home/tim/stacks/apps/qbittorrentvpn/wireguard-pia:/pia-shared
    environment:
      - USER=${PIA_USERNAME}
      - PASS=${PIA_PASSWORD}
      - LOC=de-frankfurt
      - PORT_FORWARDING=1
    restart: unless-stopped


  pf-writer:
    image: alpine:3.20
    container_name: qbittorrentvpn_pf-writer
    depends_on:
      - pia-pf
    volumes:
      - /home/tim/stacks/apps/qbittorrentvpn/wireguard-pia:/pia-shared:ro
      - /home/tim/stacks/apps/qbittorrentvpn/gluetun:/gluetun
    command: >
      /bin/sh -lc '
        while true; do
          if [ -f /pia-shared/port.dat ]; then
            cat /pia-shared/port.dat > /gluetun/forwarded_port;
          fi;
          sleep 5;
        done
      '
    restart: unless-stopped


  port-sync:
    image: docker:27-cli
    container_name: qbittorrentvpn_port-sync
    depends_on:
      - gluetun
      - qbittorrent
      - pf-writer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/tim/stacks/apps/qbittorrentvpn/gluetun:/gluetun:ro
      - /home/tim/stacks/apps/qbittorrentvpn/qbittorrent:/config
      - /home/tim/stacks/apps/qbittorrentvpn/scripts:/scripts:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
    entrypoint: ["/bin/sh", "/scripts/sync-port.sh"]
    restart: unless-stopped


networks:
  proxy:
    external: true
  internal:
    driver: bridge
