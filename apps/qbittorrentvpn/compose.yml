services:

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: qbittorrentvpn_gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      # Gluetun state + forwarded_port contract
      - /home/tim/stacks/apps/qbittorrentvpn/gluetun:/gluetun
      # Generated WireGuard config
      - /home/tim/stacks/apps/qbittorrentvpn/wireguard-pia/wg0.conf:/gluetun/wireguard/wg0.conf:ro
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - FIREWALL=on
      - LOG_LEVEL=info
    networks:
      - proxy
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.${LAN_DOMAIN}`)
      - traefik.http.routers.qbittorrent.entrypoints=web
      - traefik.http.routers.qbittorrent.service=qbittorrent
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    restart: unless-stopped


  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrentvpn-qbittorrent-1
    network_mode: "service:gluetun"
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Berlin}
    volumes:
      - /home/tim/stacks/apps/qbittorrentvpn/qbittorrent:/config
      - /mnt/d/Torrent:/downloads
    depends_on:
      - gluetun
    restart: unless-stopped


  # Handles PIA WireGuard port forwarding + keepalive
  pia-pf:
    image: thrnz/docker-wireguard-pia:latest
    container_name: qbittorrentvpn_pia-pf
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /home/tim/stacks/apps/qbittorrentvpn/wireguard-pia:/pia-shared
    environment:
      - USER=${PIA_USERNAME}
      - PASS=${PIA_PASSWORD}
      - LOC=de-frankfurt   # must match wg0.conf location
      - PORT_FORWARDING=1
    restart: unless-stopped


  # Mirrors port.dat → /gluetun/forwarded_port (your existing contract)
  pf-writer:
    image: alpine:3.20
    container_name: qbittorrentvpn_pf-writer
    depends_on:
      - pia-pf
    volumes:
      - /home/tim/stacks/apps/qbittorrentvpn/wireguard-pia:/pia-shared:ro
      - /home/tim/stacks/apps/qbittorrentvpn/gluetun:/gluetun
    command: >
      /bin/sh -lc '
        while true; do
          if [ -f /pia-shared/port.dat ]; then
            cat /pia-shared/port.dat > /gluetun/forwarded_port;
          fi;
          sleep 5;
        done
      '
    restart: unless-stopped


  # Your existing automatic qBittorrent port updater
  port-sync:
    image: docker:27-cli
    container_name: qbittorrentvpn_port-sync
    depends_on:
      - gluetun
      - qbittorrent
      - pf-writer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/tim/stacks/apps/qbittorrentvpn/gluetun:/gluetun:ro
      - /home/tim/stacks/apps/qbittorrentvpn/qbittorrent:/config
      - /home/tim/stacks/apps/qbittorrentvpn/scripts:/scripts:ro
    environment:
      - TZ=${TZ:-Europe/Berlin}
    entrypoint: ["/bin/sh", "/scripts/sync-port.sh"]
    restart: unless-stopped


networks:
  proxy:
    external: true
  internal:
    driver: bridge
